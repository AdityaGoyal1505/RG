<!DOCTYPE html>
<html lang="en">
<head><title>Login</title></head>
<body>
  <h1>Admin Login</h1>
  <form onsubmit="login(event)">

    <input id="password" type="password" placeholder="Password" required /><br/>
    <button type="submit">Login</button>
  </form>
  <script src="../js/auth.js"></script>
</body>
</html>
