<!DOCTYPE html>
<html lang="en">
<head><title>New Post</title></head>
<body>
  <h1>Create Post</h1>
  <form onsubmit="submitPost(event)">
    <input id="title" placeholder="Title" required /><br/>
    <input id="image" placeholder="Image URL" /><br/>
    <textarea id="content" placeholder="Content" required></textarea><br/>
    <input id="tags" placeholder="tags, comma separated" /><br/>
    <button type="submit">Submit</button>
  </form>
  <script src="../js/admin.js"></script>
</body>
</html>
